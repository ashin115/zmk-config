include:
  # Dongle (Xiao BLE) — central with display
  - board: xiao_ble//zmk
    shield: cradio_dongle prospector_adapter
    artifact-name: dongle_xiao

  # Left Half (nice!nano v2) — peripheral
  - board: nice_nano//zmk
    shield: cradio_left
    artifact-name: left_half

  # Right Half (nice!nano v2) — peripheral
  - board: nice_nano//zmk
    shield: cradio_right
    artifact-name: right_half

  # Settings reset firmware (useful for re-pairing)
  - board: xiao_ble//zmk
    shield: settings_reset
    artifact-name: reset_dongle

  - board: nice_nano//zmk
    shield: settings_reset
    artifact-name: reset_halves
